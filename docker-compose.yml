services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgres://intellectual_kinetic:intellectual_kinetic@postgres:5432/intellectual_kinetic
      IK_ARTIFACT_ROOT: /var/lib/intellectual-kinetic/artifacts
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ik-artifacts:/var/lib/intellectual-kinetic/artifacts

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intellectual_kinetic
      POSTGRES_PASSWORD: intellectual_kinetic
      POSTGRES_DB: intellectual_kinetic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellectual_kinetic -d intellectual_kinetic"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ik-postgres:/var/lib/postgresql/data

volumes:
  ik-postgres:
  ik-artifacts:
